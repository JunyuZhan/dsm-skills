site_name: 群晖 DSM 7.x 技巧大全
site_url: https://dsmskills.albertzhan.top/
site_description: 群晖 DSM 7.x 深度技巧大全，收录 200+ 个实用技巧，涵盖基础入门、Docker 容器、网络安全、自动化运维、多媒体中心等全方位指南。助你从小白进阶为 NAS 专家。
site_author: Junyu Zhan
repo_url: https://github.com/JunyuZhan/dsm-skills
repo_name: JunyuZhan/dsm-skills
edit_uri: edit/main/docs/
copyright: >
  Copyright &copy; 2024 Junyu Zhan
  <br>
  <span id="busuanzi_container_site_pv" style="display: none;">本站总访问量 <span id="busuanzi_value_site_pv"></span> 次</span>
  <span id="busuanzi_container_site_uv" style="display: none;">访客数 <span id="busuanzi_value_site_uv"></span> 人</span>
  <span id="busuanzi_container_page_pv" style="display: none;">本文阅读量 <span id="busuanzi_value_page_pv"></span> 次</span>

theme:
  name: material
  language: zh
  palette:
    # 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - navigation.instant
    - navigation.indexes

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: date
      timezone: Asia/Shanghai
      enable_creation_date: true
  - social:
      cards_layout_options:
        background_color: "#009688"
  - rss:
      match_path: .*
      date_from_meta:
        as_creation: date
        datetime_format: "%Y-%m-%d"
      categories:
        - categories
        - tags
  - tags


extra_javascript:
  - javascripts/busuanzi.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JunyuZhan/dsm-skills
      name: GitHub Repository
  generator: false
  # 评论系统 (Giscus) - 请替换为您自己的 Repo 信息
  # 获取方式: https://giscus.app/zh-CN
  comments:
    provider: giscus
    repo: JunyuZhan/dsm-skills
    repo_id: R_kgDONi4qQA # 替换为您的 Repo ID
    category: General # 替换为您的 Category
    category_id: DIC_kwDONi4qQM4Clj_l # 替换为您的 Category ID
    mapping: pathname
    reactions_enabled: 1
    emit_metadata: 0
    input_position: bottom
    lang: zh-CN
    theme: preferred_color_scheme
  # 页面反馈 (Was this page helpful?)
  feedback:
    title: 觉得本页内容有帮助吗？
    ratings:
      - icon: material/thumb-up-outline
        name: 有帮助
        data: 1
        note: 感谢您的反馈！
      - icon: material/thumb-down-outline
        name: 没帮助
        data: 0
        note: 我们会继续改进！

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
