site_name: 群晖 DSM 7.x 技巧大全
site_url: https://dsmskills.albertzhan.top/
site_description: 群晖 DSM 7.x 深度技巧大全，收录 200+ 个实用技巧，涵盖基础入门、Docker 容器、网络安全、自动化运维、多媒体中心等全方位指南。助你从小白进阶为 NAS 专家。
site_author: Junyu Zhan
repo_url: https://github.com/JunyuZhan/dsm-skills
repo_name: JunyuZhan/dsm-skills
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024 Junyu Zhan

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    # 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - navigation.instant
    - navigation.indexes

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: date
      timezone: Asia/Shanghai
      enable_creation_date: true
  - social:
      cards_layout_options:
        background_color: "#009688"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JunyuZhan/dsm-skills
      name: GitHub Repository
  generator: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list

