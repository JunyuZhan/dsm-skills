site_name: 群晖 DSM 7.x 技巧大全
site_url: https://github.com/JunyuZhan/dsm-skills
repo_url: https://github.com/JunyuZhan/dsm-skills
repo_name: JunyuZhan/dsm-skills
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    # 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list

