<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Music Production Storage Workflow</text>
  
  <!-- Studio -->
  <g transform="translate(50, 150)">
    <rect width="180" height="150" rx="10" fill="#fff" stroke="#333" stroke-width="2" />
    <text x="90" y="30" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Studio DAW</text>
    <text x="90" y="50" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Logic Pro / Cubase</text>
    <rect x="40" y="70" width="100" height="40" rx="5" fill="#f1f3f4" />
    <text x="90" y="95" font-family="Arial" font-size="12" text-anchor="middle">Samples (SSD)</text>
  </g>
  
  <!-- 10GbE Link -->
  <path d="M230 200 L380 200" stroke="#ea4335" stroke-width="4" stroke-dasharray="5,5" />
  <text x="305" y="190" font-family="Arial" font-size="12" fill="#ea4335" text-anchor="middle">10GbE</text>
  
  <!-- NAS -->
  <g transform="translate(380, 100)">
    <rect width="200" height="220" rx="10" fill="#fff" stroke="#4285f4" stroke-width="3" />
    <text x="100" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#4285f4" text-anchor="middle">Synology NAS</text>
    
    <!-- Volumes -->
    <rect x="30" y="50" width="140" height="60" rx="5" fill="#e8f0fe" stroke="#4285f4" />
    <text x="100" y="75" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Project Vol (SSD)</text>
    <text x="100" y="95" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Active Projects</text>
    
    <rect x="30" y="130" width="140" height="60" rx="5" fill="#f1f3f4" stroke="#999" />
    <text x="100" y="155" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Archive Vol (HDD)</text>
    <text x="100" y="175" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Old Projects</text>
  </g>
  
  <!-- Delivery -->
  <path d="M580 200 L650 200" stroke="#34a853" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Client -->
  <g transform="translate(650, 150)">
    <rect width="120" height="100" rx="10" fill="#fff" stroke="#34a853" stroke-width="2" />
    <text x="60" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#34a853" text-anchor="middle">Client</text>
    <text x="60" y="55" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Audio Station</text>
    <text x="60" y="75" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Stream Demo</text>
  </g>
  
  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34a853" />
    </marker>
  </defs>
</svg>
