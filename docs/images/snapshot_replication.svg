<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#333">Snapshot Replication Failover Process</text>

  <!-- Site A (Source) -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="200" height="250" rx="10" fill="#e9ecef" stroke="#007bff" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold" fill="#007bff">Primary NAS</text>
    
    <!-- Data -->
    <rect x="30" y="60" width="140" height="60" rx="5" fill="#fff" stroke="#333" stroke-width="1"/>
    <text x="100" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Active Data</text>
    
    <!-- Snapshot -->
    <rect x="30" y="140" width="140" height="40" rx="5" fill="#fff" stroke="#28a745" stroke-width="1"/>
    <text x="100" y="165" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#28a745">Snapshot (T1)</text>
    
    <!-- Status -->
    <text x="100" y="230" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#28a745">Online (R/W)</text>
  </g>

  <!-- Site B (Destination) -->
  <g transform="translate(500, 100)">
    <rect x="0" y="0" width="200" height="250" rx="10" fill="#e9ecef" stroke="#6c757d" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold" fill="#6c757d">Backup NAS</text>
    
    <!-- Data -->
    <rect x="30" y="60" width="140" height="60" rx="5" fill="#e9ecef" stroke="#333" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="100" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Replica Data</text>
    
    <!-- Snapshot -->
    <rect x="30" y="140" width="140" height="40" rx="5" fill="#fff" stroke="#28a745" stroke-width="1"/>
    <text x="100" y="165" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#28a745">Snapshot (T1)</text>
    
    <!-- Status -->
    <text x="100" y="230" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#dc3545">Read-Only</text>
  </g>

  <!-- Replication Link -->
  <path d="M 300 160 L 500 160" fill="none" stroke="#28a745" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="400" y="150" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#28a745">Replication (Every 15m)</text>

  <!-- Failover Scenario -->
  <g transform="translate(350, 300)">
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc3545">If Primary Fails:</text>
    <text x="50" y="40" font-family="Arial, sans-serif" font-size="12">1. Backup NAS becomes R/W</text>
    <text x="50" y="60" font-family="Arial, sans-serif" font-size="12">2. Users switch IP to Backup</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#28a745" />
    </marker>
  </defs>

</svg>