<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#333">acme.sh Automation Flow (Docker)</text>

  <!-- Docker Container -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="250" height="300" rx="10" fill="#e9ecef" stroke="#007bff" stroke-width="2"/>
    <text x="125" y="30" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold" fill="#007bff">acme.sh Container</text>
    
    <!-- Cron Job -->
    <rect x="30" y="60" width="190" height="40" rx="5" fill="#fff" stroke="#333" stroke-width="1"/>
    <text x="125" y="85" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">1. Daily Cron Check</text>
    
    <!-- Issue Logic -->
    <rect x="30" y="120" width="190" height="60" rx="5" fill="#fff" stroke="#28a745" stroke-width="2"/>
    <text x="125" y="145" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#28a745">2. Issue / Renew</text>
    <text x="125" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">DNS API Challenge</text>
    
    <!-- Deploy Hook -->
    <rect x="30" y="220" width="190" height="50" rx="5" fill="#fff" stroke="#dc3545" stroke-width="2"/>
    <text x="125" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#dc3545">3. Deploy Hook</text>
    <text x="125" y="260" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">synology_dsm</text>
  </g>

  <!-- DNS Provider (Cloud) -->
  <g transform="translate(450, 50)">
    <cloud transform="scale(3)" fill="#e9ecef" stroke="#333"/>
    <ellipse cx="60" cy="40" rx="50" ry="30" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="60" y="35" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">DNS API</text>
    <text x="60" y="55" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Aliyun / CF / Tencent</text>
  </g>

  <!-- DSM System (Right) -->
  <g transform="translate(450, 250)">
    <rect x="0" y="0" width="250" height="150" rx="10" fill="#e9ecef" stroke="#333" stroke-width="2"/>
    <text x="125" y="30" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">Synology DSM</text>
    
    <!-- Cert Manager -->
    <rect x="30" y="50" width="190" height="40" rx="5" fill="#fff" stroke="#333" stroke-width="1"/>
    <text x="125" y="75" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Certificate Manager</text>
    
    <!-- Nginx -->
    <rect x="30" y="100" width="190" height="30" rx="5" fill="#343a40"/>
    <text x="125" y="120" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#fff">Nginx Service</text>
  </g>

  <!-- Connections -->
  <!-- 1. Cron to Issue -->
  <line x1="125" y1="100" x2="125" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. Issue to DNS -->
  <path d="M 220 150 Q 350 150 450 100" fill="none" stroke="#28a745" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="350" y="130" font-family="Arial, sans-serif" font-size="10" fill="#28a745">Add TXT Record</text>

  <!-- 3. Issue to Deploy -->
  <line x1="125" y1="180" x2="125" y2="220" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="135" y="200" font-family="Arial, sans-serif" font-size="10" fill="#666">On Success</text>

  <!-- 4. Deploy to DSM -->
  <path d="M 290 250 Q 370 250 450 280" fill="none" stroke="#dc3545" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="350" y="260" font-family="Arial, sans-serif" font-size="10" fill="#dc3545">Upload & Restart</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#28a745" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc3545" />
    </marker>
  </defs>

</svg>