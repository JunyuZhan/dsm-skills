<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- NAS A (Old) -->
  <g transform="translate(100, 100)">
    <rect width="150" height="200" rx="10" fill="#333"/>
    <text x="75" y="230" text-anchor="middle" font-family="Arial" font-size="16">Old NAS</text>
    <!-- Disk Slots -->
    <rect x="25" y="30" width="100" height="30" rx="2" fill="#e74c3c" stroke="#fff"/>
    <text x="75" y="50" text-anchor="middle" fill="white" font-size="12">Disk 1</text>
    <rect x="25" y="70" width="100" height="30" rx="2" fill="#e74c3c" stroke="#fff"/>
    <text x="75" y="90" text-anchor="middle" fill="white" font-size="12">Disk 2</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(300, 180)">
    <path d="M0,20 L150,20" stroke="#2ecc71" stroke-width="4" marker-end="url(#arrowhead)"/>
    <text x="75" y="10" text-anchor="middle" font-family="Arial" font-size="14" fill="#2ecc71">Move Disks</text>
  </g>

  <!-- NAS B (New) -->
  <g transform="translate(500, 100)">
    <rect width="150" height="200" rx="10" fill="#333"/>
    <text x="75" y="230" text-anchor="middle" font-family="Arial" font-size="16">New NAS</text>
    <!-- Empty Slots to be filled -->
    <rect x="25" y="30" width="100" height="30" rx="2" fill="#e74c3c" stroke="#fff"/>
    <text x="75" y="50" text-anchor="middle" fill="white" font-size="12">Disk 1</text>
    <rect x="25" y="70" width="100" height="30" rx="2" fill="#e74c3c" stroke="#fff"/>
    <text x="75" y="90" text-anchor="middle" fill="white" font-size="12">Disk 2</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
  </defs>
</svg>