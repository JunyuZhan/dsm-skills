<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#333">Disaster Recovery Flow</text>

  <!-- Start -->
  <g transform="translate(350, 50)">
    <rect x="0" y="0" width="100" height="40" rx="5" fill="#e74c3c"/>
    <text x="50" y="25" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">NAS Down</text>
  </g>

  <!-- D1: Power On? -->
  <g transform="translate(350, 150)">
    <polygon points="50,0 100,50 50,100 0,50" fill="#f1c40f"/>
    <text x="50" y="55" text-anchor="middle" font-family="Arial" font-size="12">Power On?</text>
  </g>

  <!-- Left: No Power -> Hardware Issue -->
  <g transform="translate(100, 250)">
    <rect x="0" y="0" width="150" height="80" rx="5" fill="#95a5a6"/>
    <text x="75" y="35" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">Hardware Fail</text>
    <text x="75" y="55" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="12">Keep HDDs</text>
    <text x="75" y="70" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="12">Replace NAS</text>
  </g>

  <!-- Right: Power On -> Files Lost? -->
  <g transform="translate(550, 250)">
    <polygon points="50,0 100,50 50,100 0,50" fill="#f1c40f"/>
    <text x="50" y="55" text-anchor="middle" font-family="Arial" font-size="12">Files Lost?</text>
  </g>

  <!-- Files Lost: Yes -> Recycle/Snapshot -->
  <g transform="translate(450, 400)">
    <rect x="0" y="0" width="120" height="60" rx="5" fill="#2ecc71"/>
    <text x="60" y="25" text-anchor="middle" fill="white" font-family="Arial">Restore</text>
    <text x="60" y="45" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="10">Recycle Bin / Snapshot</text>
  </g>

  <!-- Files Lost: No (Crash) -> Ubuntu -->
  <g transform="translate(650, 400)">
    <rect x="0" y="0" width="120" height="60" rx="5" fill="#e74c3c"/>
    <text x="60" y="25" text-anchor="middle" fill="white" font-family="Arial">RAID Crash</text>
    <text x="60" y="45" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="10">Use Ubuntu PC</text>
  </g>

  <!-- Arrows -->
  <g stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M400,90 L400,150" />
    
    <!-- D1 No -->
    <path d="M350,200 L175,250" />
    <text x="250" y="210" font-family="Arial" font-size="12" fill="#e74c3c">No</text>

    <!-- D1 Yes -->
    <path d="M450,200 L600,250" />
    <text x="520" y="210" font-family="Arial" font-size="12" fill="#2ecc71">Yes</text>

    <!-- D2 Yes -->
    <path d="M550,300 L510,400" />
    <text x="510" y="350" font-family="Arial" font-size="12" fill="#e74c3c">Yes</text>

    <!-- D2 No (Crash) -->
    <path d="M650,300 L710,400" />
    <text x="700" y="350" font-family="Arial" font-size="12" fill="#e74c3c">Crash</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>