<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Hyper Backup: Block-Level Incremental</text>
  
  <!-- Source File (Day 1) -->
  <g transform="translate(50, 80)">
    <text x="60" y="0" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Day 1: Full File</text>
    <rect x="20" y="20" width="80" height="20" fill="#4285f4" stroke="#333" />
    <rect x="20" y="40" width="80" height="20" fill="#4285f4" stroke="#333" />
    <rect x="20" y="60" width="80" height="20" fill="#4285f4" stroke="#333" />
    <rect x="20" y="80" width="80" height="20" fill="#4285f4" stroke="#333" />
    <text x="60" y="120" font-family="Arial" font-size="12" text-anchor="middle">File A (100MB)</text>
  </g>
  
  <!-- Arrow -->
  <path d="M150 80 L250 80" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="200" y="70" font-family="Arial" font-size="10" text-anchor="middle">Backup</text>
  
  <!-- Target (Day 1) -->
  <g transform="translate(250, 80)">
    <rect width="100" height="100" rx="5" fill="#fff" stroke="#333" stroke-width="2" />
    <text x="50" y="120" font-family="Arial" font-size="12" text-anchor="middle">Backup Repo</text>
    <rect x="30" y="20" width="40" height="10" fill="#4285f4" />
    <rect x="30" y="35" width="40" height="10" fill="#4285f4" />
    <rect x="30" y="50" width="40" height="10" fill="#4285f4" />
    <rect x="30" y="65" width="40" height="10" fill="#4285f4" />
    <text x="50" y="90" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">All Blocks Stored</text>
  </g>
  
  <!-- Source File (Day 2) -->
  <g transform="translate(50, 250)">
    <text x="60" y="0" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Day 2: Modified</text>
    <rect x="20" y="20" width="80" height="20" fill="#4285f4" stroke="#333" />
    <rect x="20" y="40" width="80" height="20" fill="#4285f4" stroke="#333" />
    <rect x="20" y="60" width="80" height="20" fill="#ea4335" stroke="#333" /> <!-- Changed Block -->
    <rect x="20" y="80" width="80" height="20" fill="#4285f4" stroke="#333" />
    <text x="60" y="120" font-family="Arial" font-size="12" text-anchor="middle">File A' (Modified)</text>
  </g>
  
  <!-- Arrow -->
  <path d="M150 250 L250 250" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="200" y="240" font-family="Arial" font-size="10" text-anchor="middle">Incremental</text>
  
  <!-- Target (Day 2) -->
  <g transform="translate(250, 250)">
    <rect width="100" height="100" rx="5" fill="#fff" stroke="#333" stroke-width="2" />
    <text x="50" y="120" font-family="Arial" font-size="12" text-anchor="middle">Backup Repo</text>
    
    <text x="50" y="40" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Deduplication...</text>
    
    <rect x="30" y="60" width="40" height="10" fill="#ea4335" />
    <text x="50" y="85" font-family="Arial" font-size="10" fill="#ea4335" text-anchor="middle">Only New Block</text>
  </g>
  
  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>
