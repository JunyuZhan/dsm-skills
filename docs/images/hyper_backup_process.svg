<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#333">Hyper Backup Process</text>

  <!-- Source Data -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="100" height="120" rx="5" fill="#95a5a6"/>
    <text x="50" y="60" text-anchor="middle" fill="white" font-family="Arial">Source Data</text>
  </g>

  <!-- Chunking -->
  <g transform="translate(200, 150)">
    <rect x="0" y="20" width="80" height="80" rx="5" fill="#f1c40f"/>
    <text x="40" y="65" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Chunking</text>
  </g>

  <!-- Deduplication -->
  <g transform="translate(350, 150)">
    <polygon points="50,0 100,50 50,100 0,50" fill="#e67e22"/>
    <text x="50" y="55" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Dedup</text>
  </g>

  <!-- Encryption -->
  <g transform="translate(500, 150)">
    <rect x="0" y="20" width="80" height="80" rx="5" fill="#2ecc71"/>
    <text x="40" y="65" text-anchor="middle" fill="white" font-family="Arial" font-size="12">AES-256</text>
  </g>

  <!-- Destination -->
  <g transform="translate(650, 150)">
    <rect x="0" y="0" width="100" height="120" rx="5" fill="#3498db"/>
    <text x="50" y="60" text-anchor="middle" fill="white" font-family="Arial">Destination</text>
    <text x="50" y="80" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="10">HBK File</text>
  </g>

  <!-- Arrows -->
  <g stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M100,210 L200,210" />
    <path d="M280,210 L350,210" />
    <path d="M450,210 L500,210" />
    <path d="M580,210 L650,210" />
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>