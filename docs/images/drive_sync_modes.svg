<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#333">Synology Drive Sync Modes</text>

  <!-- NAS -->
  <g transform="translate(350, 50)">
    <rect x="0" y="0" width="100" height="80" rx="5" fill="#34495e"/>
    <text x="50" y="45" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">NAS</text>
  </g>

  <!-- Client 1: Two-way -->
  <g transform="translate(100, 250)">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#3498db"/>
    <text x="60" y="35" text-anchor="middle" fill="white" font-family="Arial">PC (Two-way)</text>
    <text x="60" y="60" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="10">Mirror Copy</text>
  </g>

  <!-- Client 2: One-way -->
  <g transform="translate(350, 250)">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#2ecc71"/>
    <text x="60" y="35" text-anchor="middle" fill="white" font-family="Arial">Phone (Backup)</text>
    <text x="60" y="60" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="10">Upload Only</text>
  </g>

  <!-- Client 3: On-demand -->
  <g transform="translate(600, 250)">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#f1c40f"/>
    <text x="60" y="35" text-anchor="middle" fill="white" font-family="Arial">Laptop (On-demand)</text>
    <text x="60" y="60" text-anchor="middle" fill="#fff" font-family="Arial" font-size="10">Virtual Files</text>
  </g>

  <!-- Arrows -->
  <g stroke-width="2" fill="none">
    <!-- Two-way -->
    <path d="M160,250 L350,130" stroke="#3498db" marker-end="url(#arrow-blue)"/>
    <path d="M350,130 L160,250" stroke="#3498db" marker-end="url(#arrow-blue)"/>
    
    <!-- Upload Only -->
    <path d="M410,250 L400,130" stroke="#2ecc71" marker-end="url(#arrow-green)"/>

    <!-- On-demand -->
    <path d="M660,250 L450,130" stroke="#f1c40f" stroke-dasharray="5,5"/>
    <text x="600" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#f39c12">Download on click</text>
  </g>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3498db" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2ecc71" />
    </marker>
  </defs>
</svg>