<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">VMM Network Topology (Soft Router)</text>
  
  <!-- Physical NAS -->
  <rect x="50" y="50" width="700" height="300" rx="20" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="10,5" />
  <text x="80" y="80" font-family="Arial" font-size="16" fill="#666" font-weight="bold">Synology NAS (Physical)</text>
  
  <!-- OpenWrt VM -->
  <g transform="translate(300, 150)">
    <rect width="200" height="120" rx="10" fill="#fff" stroke="#e74c3c" stroke-width="3" />
    <text x="100" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#e74c3c" text-anchor="middle">OpenWrt VM</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#ddd" stroke-width="2" />
    <text x="50" y="80" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">vNIC 1 (WAN)</text>
    <text x="150" y="80" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">vNIC 2 (LAN)</text>
  </g>
  
  <!-- WAN Connection -->
  <path d="M150 100 L350 200" stroke="#333" stroke-width="2" />
  <rect x="100" y="80" width="80" height="40" fill="#fff" stroke="#333" stroke-width="2" />
  <text x="140" y="105" font-family="Arial" font-size="12" text-anchor="middle">WAN Port</text>
  <text x="250" y="150" font-family="Arial" font-size="10" fill="#666">Passthrough / vSwitch</text>
  
  <!-- LAN Connection -->
  <path d="M450 200 L650 100" stroke="#333" stroke-width="2" />
  <rect x="620" y="80" width="80" height="40" fill="#fff" stroke="#333" stroke-width="2" />
  <text x="660" y="105" font-family="Arial" font-size="12" text-anchor="middle">LAN Port</text>
  <text x="550" y="150" font-family="Arial" font-size="10" fill="#666">vSwitch Bridge</text>
  
  <!-- External Devices -->
  <text x="140" y="60" font-family="Arial" font-size="12" text-anchor="middle" fill="#666">Modem (ISP)</text>
  <text x="660" y="60" font-family="Arial" font-size="12" text-anchor="middle" fill="#666">Switch / AP</text>
  
</svg>
