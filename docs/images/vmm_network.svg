<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#333">VMM Network Topology</text>

  <!-- Physical NAS -->
  <rect x="50" y="50" width="700" height="400" rx="10" fill="none" stroke="#34495e" stroke-width="2"/>
  <text x="70" y="80" font-family="Arial" font-weight="bold" fill="#34495e">Physical NAS</text>

  <!-- Physical Ports -->
  <g transform="translate(100, 400)">
    <rect x="0" y="0" width="60" height="40" rx="2" fill="#95a5a6"/>
    <text x="30" y="25" text-anchor="middle" fill="white" font-family="Arial" font-size="12">LAN 1</text>
  </g>
  <g transform="translate(200, 400)">
    <rect x="0" y="0" width="60" height="40" rx="2" fill="#95a5a6"/>
    <text x="30" y="25" text-anchor="middle" fill="white" font-family="Arial" font-size="12">LAN 2</text>
  </g>

  <!-- Virtual Switch -->
  <g transform="translate(100, 250)">
    <rect x="0" y="0" width="600" height="60" rx="5" fill="#3498db"/>
    <text x="300" y="35" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">Virtual Switch (vSwitch)</text>
  </g>

  <!-- VMs -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="100" height="80" rx="5" fill="#2ecc71"/>
    <text x="50" y="35" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">DSM</text>
    <text x="50" y="60" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="12">Host</text>
  </g>

  <g transform="translate(350, 100)">
    <rect x="0" y="0" width="100" height="80" rx="5" fill="#e74c3c"/>
    <text x="50" y="35" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">Windows</text>
    <text x="50" y="60" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="12">VM 1</text>
  </g>

  <g transform="translate(550, 100)">
    <rect x="0" y="0" width="100" height="80" rx="5" fill="#f1c40f"/>
    <text x="50" y="35" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">OpenWrt</text>
    <text x="50" y="60" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12">VM 2</text>
  </g>

  <!-- Connections -->
  <g stroke="#333" stroke-width="2" fill="none">
    <!-- Switch to Ports -->
    <path d="M130,310 L130,400" />
    <path d="M230,310 L230,400" />

    <!-- VMs to Switch -->
    <path d="M200,180 L200,250" />
    <path d="M400,180 L400,250" />
    <path d="M600,180 L600,250" />
  </g>
</svg>