<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Surveillance Station CMS Architecture</text>
  
  <!-- Host NAS -->
  <g transform="translate(300, 250)">
    <rect width="200" height="120" rx="10" fill="#fff" stroke="#4285f4" stroke-width="3" />
    <text x="100" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#4285f4" text-anchor="middle">CMS Host (HQ)</text>
    <path d="M20 50 L180 50" stroke="#ddd" stroke-width="2" />
    <text x="100" y="70" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Central Management</text>
    <text x="100" y="90" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Unified View</text>
    <text x="100" y="110" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">License Pool</text>
  </g>
  
  <!-- Recording Server 1 -->
  <g transform="translate(100, 80)">
    <rect width="160" height="100" rx="10" fill="#fff" stroke="#333" stroke-width="2" />
    <text x="80" y="30" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Server A (Branch 1)</text>
    <circle cx="80" cy="60" r="20" fill="#fbbc05" />
    <text x="80" y="65" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">REC</text>
  </g>
  
  <!-- Recording Server 2 -->
  <g transform="translate(540, 80)">
    <rect width="160" height="100" rx="10" fill="#fff" stroke="#333" stroke-width="2" />
    <text x="80" y="30" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Server B (Branch 2)</text>
    <circle cx="80" cy="60" r="20" fill="#fbbc05" />
    <text x="80" y="65" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">REC</text>
  </g>
  
  <!-- Connections -->
  <path d="M180 180 L350 250" stroke="#666" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <path d="M620 180 L450 250" stroke="#666" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  
  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666" />
    </marker>
  </defs>
</svg>
