<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#333">Hardware Transcoding Flow (Plex/Emby)</text>

  <!-- Media Server Container -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="300" height="200" rx="10" fill="#e9ecef" stroke="#e5a00d" stroke-width="2"/>
    <text x="150" y="30" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold" fill="#e5a00d">Plex Container</text>
    
    <!-- Transcoder -->
    <rect x="50" y="60" width="200" height="50" rx="5" fill="#fff" stroke="#333" stroke-width="1"/>
    <text x="150" y="90" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">FFmpeg Transcoder</text>
    
    <!-- RAM Disk -->
    <rect x="50" y="130" width="200" height="40" rx="5" fill="#fff" stroke="#28a745" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="150" y="155" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#28a745">/transcode (RAM)</text>
  </g>

  <!-- Hardware (Bottom) -->
  <g transform="translate(300, 350)">
    <rect x="0" y="0" width="200" height="40" rx="5" fill="#343a40"/>
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#fff">Intel iGPU (/dev/dri)</text>
  </g>

  <!-- Storage (Left) -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">NAS HDD</text>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">4K HDR Source</text>
  </g>

  <!-- Client (Right) -->
  <g transform="translate(630, 150)">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">iPhone / TV</text>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">1080p Stream</text>
  </g>

  <!-- Connections -->
  <!-- HDD to Plex -->
  <line x1="170" y1="190" x2="250" y2="190" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="210" y="180" font-family="Arial, sans-serif" font-size="10" fill="#333">Read</text>

  <!-- Plex to GPU -->
  <line x1="400" y1="110" x2="400" y2="350" stroke="#007bff" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="410" y="330" font-family="Arial, sans-serif" font-size="10" fill="#007bff">Hardware Decode</text>

  <!-- Plex to Client -->
  <line x1="550" y1="190" x2="630" y2="190" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="590" y="180" font-family="Arial, sans-serif" font-size="10" fill="#333">Stream</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

</svg>