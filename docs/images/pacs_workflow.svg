<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#333">Private PACS (Medical Imaging) Workflow</text>
  
  <!-- Modality (Scanner) -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">CT / MRI</text>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Scanner Device</text>
  </g>

  <!-- Orthanc Server (NAS) -->
  <g transform="translate(300, 130)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#e9ecef" stroke="#007bff" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold" fill="#007bff">Synology NAS</text>
    
    <!-- Docker Container -->
    <rect x="20" y="45" width="160" height="60" rx="5" fill="#fff" stroke="#333" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Orthanc (Docker)</text>
    <text x="100" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">DICOM Server :4242</text>
  </g>

  <!-- Storage -->
  <g transform="translate(350, 280)">
    <path d="M0,10 Q0,0 20,0 L80,0 Q100,0 100,10 L100,50 Q100,60 80,60 L20,60 Q0,60 0,50 Z" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="50" y="35" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Encrypted DB</text>
    <image href="data:image/svg+xml;base64," x="40" y="40" width="20" height="20"/>
  </g>

  <!-- Local Doctor -->
  <g transform="translate(600, 50)">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Workstation</text>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#28a745">Local LAN</text>
  </g>

  <!-- Remote Expert -->
  <g transform="translate(600, 250)">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Remote Expert</text>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#dc3545">VPN / HTTPS</text>
  </g>

  <!-- Cloud Backup -->
  <g transform="translate(100, 300)">
    <cloud transform="scale(3)" fill="#e9ecef" stroke="#333"/> <!-- Placeholder for cloud shape -->
    <ellipse cx="60" cy="40" rx="50" ry="30" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Cloud Backup</text>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Encrypted</text>
  </g>

  <!-- Connections -->
  <!-- Scanner to Orthanc -->
  <line x1="170" y1="190" x2="300" y2="190" stroke="#007bff" stroke-width="3"/>
  <text x="235" y="180" font-family="Arial, sans-serif" font-size="12" fill="#007bff">DICOM Push</text>

  <!-- Orthanc to Storage -->
  <line x1="400" y1="250" x2="400" y2="280" stroke="#333" stroke-width="2"/>

  <!-- Orthanc to Local -->
  <line x1="500" y1="150" x2="600" y2="90" stroke="#28a745" stroke-width="2"/>
  <text x="560" y="110" font-family="Arial, sans-serif" font-size="12" fill="#28a745">HTTP :8042</text>

  <!-- Orthanc to Remote -->
  <line x1="500" y1="230" x2="600" y2="290" stroke="#dc3545" stroke-width="2"/>
  <text x="530" y="280" font-family="Arial, sans-serif" font-size="12" fill="#dc3545">Secure Link</text>

  <!-- Storage to Cloud -->
  <path d="M 350 310 Q 250 310 160 330" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="250" y="300" font-family="Arial, sans-serif" font-size="10" fill="#666">Hyper Backup</text>

</svg>