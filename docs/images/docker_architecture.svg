<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Docker Container Architecture</text>
  
  <!-- NAS Host System -->
  <rect x="50" y="50" width="700" height="300" rx="20" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="10,5" />
  <text x="80" y="80" font-family="Arial" font-size="16" fill="#666" font-weight="bold">NAS Host System (Linux Kernel)</text>
  
  <!-- Docker Engine -->
  <g transform="translate(100, 120)">
    <rect width="600" height="200" rx="10" fill="#fff" stroke="#4285f4" stroke-width="3" />
    <text x="300" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#4285f4" text-anchor="middle">Container Manager (Docker Engine)</text>
    
    <!-- Container 1 -->
    <g transform="translate(50, 60)">
      <rect width="150" height="120" rx="5" fill="#e8f0fe" stroke="#4285f4" />
      <text x="75" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Container: Plex</text>
      
      <!-- App Binaries -->
      <rect x="25" y="40" width="100" height="30" rx="2" fill="#fff" stroke="#4285f4" />
      <text x="75" y="60" font-family="Arial" font-size="10" text-anchor="middle">App / Libs</text>
      
      <!-- Mount Point -->
      <rect x="25" y="80" width="100" height="30" rx="2" fill="#fce8b2" stroke="#fbbc05" />
      <text x="75" y="100" font-family="Arial" font-size="10" text-anchor="middle">/movies (Guest)</text>
    </g>
    
    <!-- Container 2 -->
    <g transform="translate(250, 60)">
      <rect width="150" height="120" rx="5" fill="#e8f0fe" stroke="#4285f4" />
      <text x="75" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Container: HomeAssit</text>
      
      <!-- App Binaries -->
      <rect x="25" y="40" width="100" height="30" rx="2" fill="#fff" stroke="#4285f4" />
      <text x="75" y="60" font-family="Arial" font-size="10" text-anchor="middle">App / Libs</text>
      
      <!-- Mount Point -->
      <rect x="25" y="80" width="100" height="30" rx="2" fill="#fce8b2" stroke="#fbbc05" />
      <text x="75" y="100" font-family="Arial" font-size="10" text-anchor="middle">/config (Guest)</text>
    </g>
    
    <!-- Network Bridge -->
    <rect x="450" y="60" width="100" height="120" rx="5" fill="#e6f4ea" stroke="#34a853" />
    <text x="50" y="65" font-family="Arial" font-size="12" font-weight="bold" fill="#34a853" text-anchor="middle" transform="translate(450, 0)">Bridge Network</text>
    <text x="50" y="90" font-family="Arial" font-size="10" fill="#34a853" text-anchor="middle" transform="translate(450, 0)">172.17.0.x</text>
  </g>
  
  <!-- Host Storage -->
  <g transform="translate(150, 360)">
    <rect width="150" height="30" rx="5" fill="#fbbc05" stroke="#e69138" />
    <text x="75" y="20" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">/volume1/video</text>
  </g>
  
  <g transform="translate(350, 360)">
    <rect width="150" height="30" rx="5" fill="#fbbc05" stroke="#e69138" />
    <text x="75" y="20" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">/volume1/docker/ha</text>
  </g>
  
  <!-- Arrows -->
  <path d="M225 360 L225 300" stroke="#fbbc05" stroke-width="2" stroke-dasharray="5,5" />
  <path d="M425 360 L425 300" stroke="#fbbc05" stroke-width="2" stroke-dasharray="5,5" />
  
  <text x="325" y="340" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Volume Mapping (-v)</text>
  
</svg>
