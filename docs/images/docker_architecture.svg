<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#333">Docker Architecture</text>

  <!-- Docker Host -->
  <rect x="50" y="50" width="700" height="300" rx="10" fill="none" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="70" y="80" font-family="Arial" font-size="16" fill="#3498db" font-weight="bold">Docker Host (NAS)</text>

  <!-- Image -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="120" height="100" rx="5" fill="#95a5a6"/>
    <text x="60" y="40" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">Image</text>
    <text x="60" y="60" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="12">Read-Only</text>
    <text x="60" y="80" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="12">Template</text>
  </g>

  <!-- Container -->
  <g transform="translate(350, 150)">
    <rect x="0" y="0" width="120" height="100" rx="5" fill="#2ecc71"/>
    <text x="60" y="40" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">Container</text>
    <text x="60" y="60" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="12">Running Instance</text>
    <text x="60" y="80" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="12">App Process</text>
  </g>

  <!-- Volume -->
  <g transform="translate(600, 150)">
    <path d="M0,20 C0,0 120,0 120,20 L120,80 C120,100 0,100 0,80 Z" fill="#f1c40f"/>
    <ellipse cx="60" cy="20" rx="60" ry="10" fill="#f39c12"/>
    <text x="60" y="60" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold">Volume</text>
    <text x="60" y="80" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12">Persistent Data</text>
  </g>

  <!-- Registry -->
  <g transform="translate(100, 20)">
    <text x="60" y="0" text-anchor="middle" fill="#555" font-family="Arial" font-size="12">Docker Hub</text>
    <path d="M60,10 L60,40" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Arrows -->
  <g stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M220,200 L350,200" />
    <text x="285" y="190" text-anchor="middle" font-family="Arial" font-size="12">Run</text>
    
    <path d="M470,200 L600,200" />
    <text x="535" y="190" text-anchor="middle" font-family="Arial" font-size="12">Mount</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>