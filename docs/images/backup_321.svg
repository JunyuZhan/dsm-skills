<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .text { font-family: Arial, sans-serif; }
      .title { font-size: 18px; font-weight: bold; fill: #333; }
      .label { font-size: 14px; fill: #555; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" class="title">3-2-1 Backup Strategy</text>

  <!-- Data Source -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="120" height="100" rx="10" fill="#3498db"/>
    <text x="60" y="45" text-anchor="middle" fill="white" class="text" font-weight="bold">Primary Data</text>
    <text x="60" y="70" text-anchor="middle" fill="#ecf0f1" class="label" font-size="12">PC / NAS</text>
  </g>

  <!-- Copy 1 -->
  <g transform="translate(250, 50)">
    <rect x="0" y="0" width="120" height="100" rx="10" fill="#2ecc71"/>
    <text x="60" y="45" text-anchor="middle" fill="white" class="text" font-weight="bold">Copy 1</text>
    <text x="60" y="70" text-anchor="middle" fill="#ecf0f1" class="label" font-size="12">Local NAS Snapshots</text>
  </g>

  <!-- Copy 2 -->
  <g transform="translate(250, 250)">
    <rect x="0" y="0" width="120" height="100" rx="10" fill="#f1c40f"/>
    <text x="60" y="45" text-anchor="middle" fill="white" class="text" font-weight="bold">Copy 2</text>
    <text x="60" y="70" text-anchor="middle" fill="#fff" class="label" font-size="12">USB Drive (Offline)</text>
  </g>

  <!-- Offsite -->
  <g transform="translate(550, 150)">
    <rect x="0" y="0" width="120" height="100" rx="10" fill="#9b59b6"/>
    <text x="60" y="45" text-anchor="middle" fill="white" class="text" font-weight="bold">Offsite Copy</text>
    <text x="60" y="70" text-anchor="middle" fill="#ecf0f1" class="label" font-size="12">Cloud / Remote NAS</text>
  </g>

  <!-- Arrows -->
  <g stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <!-- Source to Copy 1 -->
    <path d="M170,180 L250,120" />
    <!-- Source to Copy 2 -->
    <path d="M170,220 L250,280" />
    <!-- Source to Offsite -->
    <path d="M170,200 L550,200" stroke-dasharray="5,5"/>
  </g>

  <text x="400" y="215" text-anchor="middle" class="label" fill="#7f8c8d">Encrypted Transfer</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7f8c8d" />
    </marker>
  </defs>
</svg>