<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <!-- Background -->
  <rect width="800" height="300" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">3-2-1 Backup Strategy</text>
  
  <!-- 3 Copies -->
  <g transform="translate(100, 80)">
    <text x="100" y="0" font-family="Arial" font-size="60" font-weight="bold" fill="#4285f4" text-anchor="middle">3</text>
    <text x="100" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Copies of Data</text>
    
    <rect x="20" y="50" width="50" height="60" rx="5" fill="#fff" stroke="#4285f4" stroke-width="2" />
    <text x="45" y="85" font-family="Arial" font-size="10" text-anchor="middle">Original</text>
    
    <rect x="80" y="50" width="50" height="60" rx="5" fill="#fff" stroke="#4285f4" stroke-width="2" />
    <text x="105" y="85" font-family="Arial" font-size="10" text-anchor="middle">Copy 1</text>
    
    <rect x="140" y="50" width="50" height="60" rx="5" fill="#fff" stroke="#4285f4" stroke-width="2" />
    <text x="165" y="85" font-family="Arial" font-size="10" text-anchor="middle">Copy 2</text>
  </g>
  
  <!-- Divider -->
  <line x1="280" y1="50" x2="280" y2="250" stroke="#ddd" stroke-width="2" />
  
  <!-- 2 Media -->
  <g transform="translate(300, 80)">
    <text x="100" y="0" font-family="Arial" font-size="60" font-weight="bold" fill="#34a853" text-anchor="middle">2</text>
    <text x="100" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Different Media</text>
    
    <g transform="translate(40, 50)">
      <rect width="60" height="40" rx="2" fill="#fff" stroke="#34a853" stroke-width="2" />
      <text x="30" y="25" font-family="Arial" font-size="10" text-anchor="middle">NAS HDD</text>
    </g>
    
    <g transform="translate(110, 50)">
      <rect width="40" height="60" rx="2" fill="#fff" stroke="#34a853" stroke-width="2" />
      <text x="20" y="35" font-family="Arial" font-size="10" text-anchor="middle">USB</text>
    </g>
  </g>
  
  <!-- Divider -->
  <line x1="520" y1="50" x2="520" y2="250" stroke="#ddd" stroke-width="2" />
  
  <!-- 1 Offsite -->
  <g transform="translate(540, 80)">
    <text x="100" y="0" font-family="Arial" font-size="60" font-weight="bold" fill="#ea4335" text-anchor="middle">1</text>
    <text x="100" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Offsite Copy</text>
    
    <cloud transform="translate(60, 40) scale(0.8)" />
    <ellipse cx="100" cy="70" rx="50" ry="30" fill="#fff" stroke="#ea4335" stroke-width="2" />
    <text x="100" y="75" font-family="Arial" font-size="12" fill="#ea4335" text-anchor="middle">Cloud / Remote</text>
  </g>
  
</svg>
