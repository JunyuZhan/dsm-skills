<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#333">Authelia Single Sign-On (SSO) Flow</text>

  <!-- User (Left) -->
  <g transform="translate(50, 150)">
    <circle cx="40" cy="40" r="30" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="40" y="90" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">User</text>
    <text x="40" y="110" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Browser</text>
  </g>

  <!-- Nginx (Center) -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="120" height="200" rx="5" fill="#343a40"/>
    <text x="60" y="30" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold" fill="#fff">Nginx</text>
    <text x="60" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#adb5bd">Reverse Proxy</text>
    
    <text x="60" y="100" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#fff">auth_request</text>
  </g>

  <!-- Authelia (Top) -->
  <g transform="translate(450, 50)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#e9ecef" stroke="#007bff" stroke-width="2"/>
    <text x="75" y="30" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold" fill="#007bff">Authelia</text>
    <text x="75" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Identity Provider</text>
    
    <rect x="30" y="65" width="90" height="25" rx="2" fill="#fff" stroke="#007bff"/>
    <text x="75" y="82" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#007bff">2FA / MFA</text>
  </g>

  <!-- App (Bottom) -->
  <g transform="translate(450, 250)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#e9ecef" stroke="#28a745" stroke-width="2"/>
    <text x="75" y="30" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold" fill="#28a745">App</text>
    <text x="75" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Sonarr / Radarr</text>
    
    <text x="75" y="80" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">Protected Resource</text>
  </g>

  <!-- Connections -->
  <!-- 1. Request -->
  <line x1="90" y1="160" x2="250" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="170" y="150" font-family="Arial, sans-serif" font-size="12" fill="#333">1. Visit App</text>

  <!-- 2. Auth Check -->
  <path d="M 310 100 Q 310 80 450 80" fill="none" stroke="#007bff" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="360" y="70" font-family="Arial, sans-serif" font-size="10" fill="#007bff">2. Check Auth</text>

  <!-- 3. Response -->
  <path d="M 450 120 Q 350 120 370 140" fill="none" stroke="#007bff" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-blue)"/>
  <text x="420" y="140" font-family="Arial, sans-serif" font-size="10" fill="#007bff">3. Allow (200 OK)</text>

  <!-- 4. Forward -->
  <path d="M 310 200 Q 310 300 450 300" fill="none" stroke="#28a745" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="360" y="280" font-family="Arial, sans-serif" font-size="10" fill="#28a745">4. Proxy Pass</text>

  <!-- Redirect Logic (If 401) -->
  <path d="M 450 50 Q 250 20 90 120" fill="none" stroke="#dc3545" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-red)"/>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="10" fill="#dc3545">Redirect to Login (If 401)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#007bff" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#28a745" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc3545" />
    </marker>
  </defs>

</svg>