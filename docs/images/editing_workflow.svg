<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Video Editing Workflow (10GbE)</text>
  
  <!-- Step 1: Ingest -->
  <g transform="translate(50, 150)">
    <rect width="100" height="80" rx="5" fill="#fff" stroke="#333" stroke-width="2" />
    <text x="50" y="30" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Ingest</text>
    <text x="50" y="50" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">SD Card / USB</text>
    <text x="50" y="70" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">USB Copy</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M150 190 L200 190" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Step 2: NAS Storage -->
  <g transform="translate(200, 130)">
    <rect width="140" height="120" rx="10" fill="#fff" stroke="#4285f4" stroke-width="3" />
    <text x="70" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#4285f4" text-anchor="middle">NAS Storage</text>
    <text x="70" y="55" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">RAID 5/6/10</text>
    <text x="70" y="75" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">SMB / NFS</text>
    <text x="70" y="95" font-family="Arial" font-size="12" fill="#e74c3c" text-anchor="middle">10GbE Interface</text>
  </g>
  
  <!-- Connection: 10GbE -->
  <path d="M340 190 L440 190" stroke="#e74c3c" stroke-width="4" stroke-dasharray="5,5" />
  <text x="390" y="180" font-family="Arial" font-size="12" fill="#e74c3c" text-anchor="middle">10GbE Direct</text>
  
  <!-- Step 3: Workstation -->
  <g transform="translate(440, 130)">
    <rect width="140" height="120" rx="10" fill="#fff" stroke="#333" stroke-width="2" />
    <text x="70" y="30" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Workstation</text>
    <text x="70" y="55" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">FCP / Premiere</text>
    <text x="70" y="75" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Library on Local SSD</text>
    <text x="70" y="95" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Media on NAS</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M580 190 L630 190" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Step 4: Delivery -->
  <g transform="translate(630, 150)">
    <rect width="100" height="80" rx="5" fill="#fff" stroke="#34a853" stroke-width="2" />
    <text x="50" y="30" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Delivery</text>
    <text x="50" y="50" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">FileBrowser</text>
    <text x="50" y="70" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Client Preview</text>
  </g>
  
  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>
