<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .box { fill: #ecf0f1; stroke: #bdc3c7; stroke-width: 2; rx: 5; }
      .decision { fill: #f1c40f; stroke: #f39c12; stroke-width: 2; transform: rotate(45deg); }
      .yes { stroke: #2ecc71; stroke-width: 2; fill: none; }
      .no { stroke: #e74c3c; stroke-width: 2; fill: none; }
      .end-allow { fill: #2ecc71; stroke: #27ae60; stroke-width: 2; rx: 5; }
      .end-deny { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; rx: 5; }
    </style>
  </defs>

  <rect width="800" height="500" fill="#f8f9fa"/>

  <!-- Start -->
  <g transform="translate(350, 20)">
    <rect x="0" y="0" width="100" height="40" class="box"/>
    <text x="50" y="25" text-anchor="middle" class="text">Start Check</text>
  </g>

  <!-- Decision 1: Deny? -->
  <g transform="translate(400, 100)">
    <polygon points="0,-40 40,0 0,40 -40,0" fill="#f1c40f" stroke="#f39c12" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" class="text" font-size="12">Explicit Deny?</text>
  </g>

  <!-- Decision 2: Allow? -->
  <g transform="translate(400, 220)">
    <polygon points="0,-40 40,0 0,40 -40,0" fill="#f1c40f" stroke="#f39c12" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" class="text" font-size="12">Explicit Allow?</text>
  </g>

  <!-- Decision 3: Inherit? -->
  <g transform="translate(400, 340)">
    <polygon points="0,-40 40,0 0,40 -40,0" fill="#f1c40f" stroke="#f39c12" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" class="text" font-size="12">Inherit Allow?</text>
  </g>

  <!-- End: Deny -->
  <g transform="translate(600, 100)">
    <rect x="-50" y="-20" width="100" height="40" class="end-deny"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-weight="bold" class="text">Access Denied</text>
  </g>

  <!-- End: Allow -->
  <g transform="translate(600, 220)">
    <rect x="-50" y="-20" width="100" height="40" class="end-allow"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-weight="bold" class="text">Access Granted</text>
  </g>

  <!-- Arrows -->
  <g fill="none" marker-end="url(#arrow)">
    <!-- Start -> D1 -->
    <path d="M400,60 L400,60" stroke="#7f8c8d" stroke-width="2"/> 
    
    <!-- D1 Yes -> Deny -->
    <path d="M440,100 L550,100" class="yes"/>
    <text x="480" y="90" class="text" fill="#2ecc71">Yes</text>
    
    <!-- D1 No -> D2 -->
    <path d="M400,140 L400,180" class="no"/>
    <text x="410" y="160" class="text" fill="#e74c3c">No</text>
    
    <!-- D2 Yes -> Allow -->
    <path d="M440,220 L550,220" class="yes"/>
    <text x="480" y="210" class="text" fill="#2ecc71">Yes</text>

    <!-- D2 No -> D3 -->
    <path d="M400,260 L400,300" class="no"/>
    <text x="410" y="280" class="text" fill="#e74c3c">No</text>

    <!-- D3 Yes -> Allow -->
    <path d="M440,340 L550,340" class="yes"/>
    <path d="M550,340 L600,240" stroke="#2ecc71" stroke-width="2" stroke-dasharray="5,5"/> <!-- Connecting back to allow box roughly -->
    
    <!-- D3 No -> Deny -->
    <path d="M400,380 L400,420 L600,420 L600,140" class="no"/> <!-- Long path back to deny -->
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7f8c8d" />
    </marker>
  </defs>
</svg>