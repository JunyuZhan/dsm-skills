<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Reverse Proxy Traffic Flow</text>
  
  <!-- User/Internet -->
  <g transform="translate(50, 150)">
    <cloud transform="scale(0.8)" />
    <ellipse cx="60" cy="40" rx="50" ry="30" fill="#ddd" stroke="#999" />
    <text x="60" y="45" font-family="Arial" font-size="12" text-anchor="middle">Internet</text>
    <text x="60" y="100" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">User (HTTPS)</text>
    <text x="60" y="120" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">port 443</text>
  </g>
  
  <!-- Firewall/Router -->
  <g transform="translate(200, 120)">
    <rect width="20" height="100" fill="#ea4335" />
    <text x="10" y="130" font-family="Arial" font-size="12" fill="#ea4335" text-anchor="middle">Firewall</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M120 170 L200 170" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- NAS Reverse Proxy -->
  <g transform="translate(250, 80)">
    <rect width="150" height="200" rx="10" fill="#fff" stroke="#4285f4" stroke-width="3" />
    <text x="75" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#4285f4" text-anchor="middle">Nginx Proxy</text>
    <text x="75" y="50" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">SSL Termination</text>
    <text x="75" y="70" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">*.domain.com</text>
    
    <!-- Routing Logic -->
    <path d="M20 90 L130 90" stroke="#ddd" stroke-width="1" />
    <text x="75" y="110" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">video.domain.com</text>
    <text x="75" y="130" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">dsm.domain.com</text>
    <text x="75" y="150" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">ha.domain.com</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M220 170 L250 170" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Backend Services -->
  <g transform="translate(500, 50)">
    <!-- Service 1 -->
    <rect width="120" height="60" rx="5" fill="#fff" stroke="#34a853" stroke-width="2" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Jellyfin</text>
    <text x="60" y="45" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">localhost:8096</text>
    
    <!-- Service 2 -->
    <rect x="0" y="100" width="120" height="60" rx="5" fill="#fff" stroke="#4285f4" stroke-width="2" />
    <text x="60" y="125" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">DSM</text>
    <text x="60" y="145" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">localhost:5000</text>
    
    <!-- Service 3 -->
    <rect x="0" y="200" width="120" height="60" rx="5" fill="#fff" stroke="#fbbc05" stroke-width="2" />
    <text x="60" y="225" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Home Asst</text>
    <text x="60" y="245" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">localhost:8123</text>
  </g>
  
  <!-- Arrows to Backends -->
  <path d="M400 110 L500 80" stroke="#333" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <path d="M400 130 L500 130" stroke="#333" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <path d="M400 150 L500 230" stroke="#333" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  
  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>
