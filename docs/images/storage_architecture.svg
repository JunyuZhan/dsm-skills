<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Synology Storage Architecture</text>
  
  <!-- Layer 1: Physical Drives -->
  <g transform="translate(100, 380)">
    <rect width="600" height="100" rx="10" fill="#ddd" stroke="#999" stroke-width="2" />
    <text x="300" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">Physical Layer (Hard Drives / SSDs)</text>
    
    <!-- Drive 1 -->
    <rect x="50" y="40" width="80" height="40" rx="2" fill="#fff" stroke="#333" />
    <text x="90" y="65" font-family="Arial" font-size="12" text-anchor="middle">Drive 1</text>
    
    <!-- Drive 2 -->
    <rect x="150" y="40" width="80" height="40" rx="2" fill="#fff" stroke="#333" />
    <text x="190" y="65" font-family="Arial" font-size="12" text-anchor="middle">Drive 2</text>
    
    <!-- Drive 3 -->
    <rect x="250" y="40" width="80" height="40" rx="2" fill="#fff" stroke="#333" />
    <text x="290" y="65" font-family="Arial" font-size="12" text-anchor="middle">Drive 3</text>
    
    <!-- Drive 4 -->
    <rect x="350" y="40" width="80" height="40" rx="2" fill="#fff" stroke="#333" />
    <text x="390" y="65" font-family="Arial" font-size="12" text-anchor="middle">Drive 4</text>
    
    <!-- SSD Cache -->
    <rect x="480" y="40" width="80" height="40" rx="2" fill="#e8f0fe" stroke="#4285f4" />
    <text x="520" y="65" font-family="Arial" font-size="12" fill="#4285f4" text-anchor="middle">SSD 1</text>
  </g>
  
  <!-- Arrow Up -->
  <path d="M400 380 L400 340" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Layer 2: Storage Pool (RAID) -->
  <g transform="translate(100, 240)">
    <rect width="600" height="100" rx="10" fill="#fff" stroke="#4285f4" stroke-width="3" />
    <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#4285f4" text-anchor="middle">Storage Pool (RAID Group)</text>
    <text x="300" y="55" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">SHR / RAID 1 / RAID 5 / RAID 10</text>
    <text x="300" y="80" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Data Protection & Redundancy</text>
  </g>
  
  <!-- Arrow Up -->
  <path d="M400 240 L400 200" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Layer 3: Volume (File System) -->
  <g transform="translate(150, 140)">
    <rect width="200" height="60" rx="5" fill="#fff" stroke="#34a853" stroke-width="3" />
    <text x="100" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#34a853" text-anchor="middle">Volume 1</text>
    <text x="100" y="45" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Btrfs (Recommended)</text>
  </g>
  
  <g transform="translate(450, 140)">
    <rect width="200" height="60" rx="5" fill="#fff" stroke="#34a853" stroke-width="3" />
    <text x="100" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#34a853" text-anchor="middle">Volume 2</text>
    <text x="100" y="45" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">ext4 / Btrfs</text>
  </g>
  
  <!-- Arrow Up -->
  <path d="M250 140 L250 100" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M550 140 L550 100" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Layer 4: Shared Folders -->
  <g transform="translate(150, 50)">
    <rect width="90" height="50" rx="5" fill="#fbbc05" stroke="#e69138" />
    <text x="45" y="30" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">/photo</text>
    
    <rect x="110" y="50" width="90" height="50" rx="5" fill="#fbbc05" stroke="#e69138" />
    <text x="155" y="30" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">/docker</text>
  </g>
  
  <g transform="translate(450, 50)">
    <rect width="90" height="50" rx="5" fill="#fbbc05" stroke="#e69138" />
    <text x="45" y="30" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">/video</text>
    
    <rect x="110" y="50" width="90" height="50" rx="5" fill="#fbbc05" stroke="#e69138" />
    <text x="155" y="30" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">/backup</text>
  </g>
  
  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666" />
    </marker>
  </defs>
</svg>
