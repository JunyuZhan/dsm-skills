<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .text { font-family: Arial, sans-serif; }
      .title { font-size: 16px; font-weight: bold; fill: #333; }
      .label { font-size: 14px; fill: #555; }
      .small { font-size: 12px; fill: #777; }
    </style>
    <linearGradient id="poolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="volGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>

  <!-- Physical Layer -->
  <g transform="translate(50, 50)">
    <text x="0" y="-10" class="title">Physical Layer (硬盘)</text>
    <rect x="0" y="0" width="100" height="60" rx="5" fill="#95a5a6" stroke="#7f8c8d"/>
    <text x="50" y="35" text-anchor="middle" fill="white" class="text">HDD 1</text>
    
    <rect x="120" y="0" width="100" height="60" rx="5" fill="#95a5a6" stroke="#7f8c8d"/>
    <text x="170" y="35" text-anchor="middle" fill="white" class="text">HDD 2</text>
    
    <rect x="240" y="0" width="100" height="60" rx="5" fill="#95a5a6" stroke="#7f8c8d"/>
    <text x="290" y="35" text-anchor="middle" fill="white" class="text">HDD 3</text>
  </g>

  <!-- Logical Layer - Storage Pool -->
  <g transform="translate(50, 180)">
    <text x="0" y="-10" class="title">Storage Pool (存储池 - RAID/SHR)</text>
    <rect x="0" y="0" width="340" height="80" rx="5" fill="url(#poolGrad)"/>
    <text x="170" y="45" text-anchor="middle" fill="white" class="text" font-weight="bold">Storage Pool 1 (SHR)</text>
    <text x="170" y="65" text-anchor="middle" fill="#ecf0f1" class="small">Data Protection & Redundancy</text>
  </g>

  <!-- Logical Layer - Volumes -->
  <g transform="translate(50, 310)">
    <text x="0" y="-10" class="title">Volumes (存储空间 - Btrfs)</text>
    <rect x="0" y="0" width="160" height="80" rx="5" fill="url(#volGrad)"/>
    <text x="80" y="45" text-anchor="middle" fill="white" class="text" font-weight="bold">Volume 1</text>
    
    <rect x="180" y="0" width="160" height="80" rx="5" fill="url(#volGrad)"/>
    <text x="260" y="45" text-anchor="middle" fill="white" class="text" font-weight="bold">Volume 2</text>
  </g>

  <!-- Shared Folders -->
  <g transform="translate(50, 440)">
    <text x="0" y="-10" class="title">Shared Folders (共享文件夹)</text>
    
    <!-- Under Volume 1 -->
    <rect x="0" y="0" width="70" height="40" rx="3" fill="#f1c40f" stroke="#f39c12"/>
    <text x="35" y="25" text-anchor="middle" class="small">/photo</text>
    
    <rect x="80" y="0" width="70" height="40" rx="3" fill="#f1c40f" stroke="#f39c12"/>
    <text x="115" y="25" text-anchor="middle" class="small">/docker</text>

    <!-- Under Volume 2 -->
    <rect x="180" y="0" width="70" height="40" rx="3" fill="#f1c40f" stroke="#f39c12"/>
    <text x="215" y="25" text-anchor="middle" class="small">/video</text>
  </g>

  <!-- Arrows -->
  <g stroke="#bdc3c7" stroke-width="2" fill="none">
    <!-- HDD to Pool -->
    <path d="M100,110 L170,180" />
    <path d="M170,110 L170,180" />
    <path d="M240,110 L170,180" />
    
    <!-- Pool to Volumes -->
    <path d="M170,260 L80,310" />
    <path d="M170,260 L260,310" />
    
    <!-- Volume to Folders -->
    <path d="M80,390 L35,440" />
    <path d="M80,390 L115,440" />
    <path d="M260,390 L215,440" />
  </g>
</svg>